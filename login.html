<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoliSpace - Log Masuk</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
      background:
        radial-gradient(ellipse 50% 40% at 50% 40%, rgba(201,168,76,0.08), transparent 65%),
        var(--bg-main);
    }

    .unified-login-card {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow);
    }

    .unified-login-head {
      text-align: center;
      margin-bottom: 30px;
    }

    .unified-login-icon {
      width: 54px;
      height: 54px;
      background: var(--gold);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      margin: 0 auto 18px;
    }

    .unified-login-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0;
      margin-bottom: 6px;
    }

    .unified-login-sub {
      color: var(--grey-4);
      font-size: 14px;
      line-height: 1.6;
    }

    .login-error {
      display: none;
      color: var(--red);
      background: #FDECEC;
      border: 1px solid rgba(198, 65, 65, 0.16);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 16px;
    }

    .login-error.show { display: block; }

    .login-helper {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 18px;
      padding: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      color: var(--grey-4);
      font-size: 12px;
      line-height: 1.5;
    }

    .login-helper i {
      color: var(--gold);
      margin-top: 2px;
    }

    @media (max-width: 520px) {
      .login-page { padding: 104px 18px 48px; }
      .unified-login-card { padding: 28px 22px; }
    }
  </style>
</head>
<body>
  <nav id="main-nav">
    <div class="nav-logo" onclick="window.location.href='index.html'">
      <div class="nav-logo-mark"></div>
      <div>
        <div class="nav-logo-text">PoliSpace</div>
        <div class="nav-logo-sub">Fasiliti</div>
      </div>
    </div>
    <div class="nav-links">
      <button class="nav-link" onclick="window.location.href='index.html'">Laman Utama</button>
      <button class="nav-link" onclick="window.location.href='booking.html'">Tempahan</button>
      <button class="nav-link" onclick="window.location.href='status.html'">Semak Status</button>
    </div>
    <div class="nav-actions">
      <button class="btn-nav-admin" onclick="window.location.href='login.html'" style="background:var(--gold);color:#fff;border-color:var(--gold);">Log Masuk</button>
    </div>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <main class="login-page">
    <section class="unified-login-card" aria-label="Log masuk PoliSpace">
      <div class="unified-login-head">
        <div class="unified-login-icon"></div>
        <h1 class="unified-login-title">Log Masuk</h1>
        <p class="unified-login-sub">Masukkan e-mel dan kata laluan. Sistem akan mengesan akaun admin atau pelanggan secara automatik.</p>
      </div>

      <div class="login-error" id="loginError">E-mel atau kata laluan tidak sah.</div>

      <form onsubmit="event.preventDefault(); doAutoLogin();">
        <div class="form-group">
          <label>Alamat E-mel</label>
          <input type="email" id="login-email" placeholder="nama@email.com" autocomplete="username">
        </div>
        <div class="form-group" style="margin-top:16px;">
          <label>Kata Laluan</label>
          <input type="password" id="login-password" placeholder="Masukkan kata laluan" autocomplete="current-password">
        </div>

        <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;margin-top:22px;padding:15px;">
          <i class="bi bi-box-arrow-in-right"></i> Log Masuk
        </button>
      </form>

      <div class="login-helper">
        <i class="bi bi-info-circle"></i>
        <span>Pelanggan perlu menggunakan kata laluan yang diberikan oleh admin selepas tempahan berjaya.</span>
      </div>
    </section>
  </main>

  <script src="script.js?v=20260717-autologin"></script>
</body>
</html>
