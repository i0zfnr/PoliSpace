<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoliSpace — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/PoliSpace/resources/css/style.css?v=20260718-calendar-nav">
</head>
<body>
  <div id="admin-login" class="active">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-mark"></div>
        <div class="login-title">Admin Portal</div>
      </div>
      <div class="login-form">
        <div class="login-error" id="loginError">Nama pengguna atau kata laluan tidak sah.</div>
        <div class="form-group"><label>E-mel Admin</label><input type="text" id="login-user" value="admin@polspace.com"></div>
        <div class="form-group"><label>Kata Laluan</label><input type="password" id="login-pass" value="admin123" onkeydown="if(event.key==='Enter') doLogin()"></div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="doLogin()">Log Masuk</button>
        <button class="btn btn-ghost" style="width:100%;justify-content:center;" onclick="window.location.href='/PoliSpace/resources/views/welcome.html'"><i class="bi bi-arrow-left"></i> Kembali ke Web</button>
      </div>
    </div>
  </div>
  <script src="/PoliSpace/resources/js/script.js?v=20260718-calendar-nav"></script>
</body>
</html>
