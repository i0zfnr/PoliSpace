<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoliSpace — Admin Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/PoliSpace/resources/css/style.css?v=20260718-split-assets">
</head>
<body>
  <nav id="main-nav">
    <div class="nav-logo" onclick="window.location.href='/PoliSpace/resources/views/welcome.html'">
      <div class="nav-logo-mark"></div><div><div class="nav-logo-text">PoliSpace</div></div>
    </div>
    <div class="nav-links"><span style="color:var(--gold);font-size:12px;text-transform:uppercase;">Admin Mode</span></div>
    <div class="nav-actions"><button class="btn-nav-admin" onclick="doLogout()">Log Keluar</button></div>
  </nav>
  <div class="toast-container" id="toastContainer"></div>

  <div id="admin" class="active">
    <div class="admin-layout">
      <div class="admin-sidebar">
        <div class="admin-menu-label">Utama</div>
        <button class="admin-menu-item active" onclick="showAdminPanel('dashboard', this)"><span class="menu-icon"><i class="bi bi-bar-chart"></i></span> Dashboard</button>
        <button class="admin-menu-item" onclick="showAdminPanel('bookings', this)"><span class="menu-icon"><i class="bi bi-card-list"></i></span> Tempahan <span class="admin-badge" id="pendingBadge">0</span></button>
        <div class="admin-menu-label">Pengurusan</div>
        <button class="admin-menu-item" onclick="showAdminPanel('clients', this)"><span class="menu-icon"><i class="bi bi-people"></i></span> Pelanggan</button>
        <button class="admin-menu-item" onclick="showAdminPanel('facilities', this)"><span class="menu-icon"><i class="bi bi-building"></i></span> Fasiliti</button>
        <button class="admin-menu-item" onclick="showAdminPanel('calendar', this)"><span class="menu-icon"><i class="bi bi-calendar3"></i></span> Kalendar</button>
      </div>

      <div class="admin-content">
        <div class="admin-panel active" id="panel-dashboard">
          <h2 style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:8px">Dashboard</h2>
          <p style="color:var(--grey-4);font-size:13px;margin-bottom:32px" id="dashDate"></p>
          <div class="stats-grid" id="adminStats"></div>
          <div class="admin-card">
            <div class="admin-card-header">
              <div class="admin-card-title">Tempahan Terbaru</div>
              <button class="btn btn-ghost btn-sm" onclick="showAdminPanel('bookings', document.querySelectorAll('.admin-menu-item')[1])">Lihat Semua <i class="bi bi-arrow-right"></i></button>
            </div>
            <table class="data-table"><thead><tr><th>ID</th><th>Penyewa</th><th>Fasiliti</th><th>Tarikh</th><th>Status</th><th>Tindakan</th></tr></thead><tbody id="recentBookingsTbody"></tbody></table>
          </div>
        </div>

        <div class="admin-panel" id="panel-bookings">
          <div style="display:flex;justify-content:space-between;margin-bottom:32px;">
            <h2>Pengurusan Tempahan</h2>
            <div class="filter-tabs" id="bookingFilterTabs"><button class="filter-tab active" onclick="filterBookings('all', this)">Semua</button><button class="filter-tab" onclick="filterBookings('pending', this)">Menunggu</button><button class="filter-tab" onclick="filterBookings('approved', this)">Diluluskan</button><button class="filter-tab" onclick="filterBookings('rejected', this)">Ditolak</button></div>
          </div>
          <div class="admin-card"><table class="data-table"><thead><tr><th>ID</th><th>Penyewa</th><th>Fasiliti</th><th>Tarikh</th><th>Status</th><th>Tindakan</th></tr></thead><tbody id="allBookingsTbody"></tbody></table></div>
        </div>

        <div class="admin-panel" id="panel-clients">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;gap:16px;flex-wrap:wrap;">
            <h2>Pengurusan Pelanggan</h2>
            <button class="btn btn-secondary btn-sm" onclick="loadClients()"><i class="bi bi-arrow-clockwise"></i> Muat Semula</button>
          </div>
          <div class="admin-card">
            <table class="data-table">
              <thead><tr><th>Nama</th><th>E-mel</th><th>No Telefon</th><th>Tempahan</th><th>Tindakan</th></tr></thead>
              <tbody id="clientsTbody"></tbody>
            </table>
          </div>
        </div>

        <div class="admin-panel" id="panel-facilities">
          <h2 style="margin-bottom:32px;">Pengurusan Fasiliti</h2>
          <div class="facility-manage-grid" id="facilityManageGrid"></div>
        </div>

        <div class="admin-panel" id="panel-calendar">
          <h2 style="margin-bottom:32px;">Kalendar Tempahan</h2>
          <div class="admin-card" style="padding:32px"><div id="calendarView"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="bookingModal">
    <div class="modal">
      <div class="modal-header"><div class="modal-title" id="modalTitle"></div><button class="modal-close" onclick="closeModal('bookingModal')"><i class="bi bi-x-lg"></i></button></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script src="/PoliSpace/resources/js/script.js?v=20260718-split-assets"></script>
</body>
</html>
